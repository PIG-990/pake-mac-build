name: Build Mac App

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动点击打包

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rust.rs | sh -s -- -y

      - name: Install Pake
        run: npm install -g pake-cli

      - name: Build for Mac
        run: |
          pake https://449898.meoo.info --name BigPig-Seedance2.0 --width 1400 --height 900

      - name: Upload Mac App
        uses: actions/upload-artifact@v4
        with:
          name: mac-app
          path: "*.dmg"
